<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界特集 — Kanta Daily Brief</title>
  <meta name="description" content="AIが毎日1つの国・文化・社会を深掘り。今日はどこへ？">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kanta4720.github.io/kanta-ai-lab/world.html">
  <meta property="og:title" content="世界特集 — Kanta Daily Brief">
  <meta property="og:description" content="AIが毎日1つの国・文化・社会を深掘り。今日はどこへ？">
  <meta name="twitter:card" content="summary">
  <style>
    :root {
      --bg: #f8f7f4;
      --bg2: #ffffff;
      --card: #ffffff;
      --text: #1a1a1a;
      --text2: #5a5a5a;
      --muted: #9a9a9a;
      --border: #e8e6e1;
      --accent: #c8a96e;
      --accent2: #a88a50;
      --hero-from: #0d2137;
      --hero-to: #1a4a6e;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --radius: 16px;
      --font-serif: 'Georgia', 'Times New Roman', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0f0f0f; --bg2: #1a1a1a; --card: #1e1e1e;
      --text: #f0ede8; --text2: #a0a0a0; --muted: #555;
      --border: #2a2a2a; --hero-from: #050e18; --hero-to: #0a2035;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.7; transition: background .3s, color .3s; }
    a { color: inherit; text-decoration: none; }

    /* ===== NAV ===== */
    nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      transition: background .3s;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
    }
    .nav-brand { font-family: var(--font-serif); font-size: 17px; font-weight: 700; color: var(--text); }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
      color: var(--text2); transition: all .2s; white-space: nowrap;
    }
    .nav-link:hover { background: var(--border); color: var(--text); }
    .nav-link.active { background: var(--accent); color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .theme-btn {
      background: none; border: 1px solid var(--border); border-radius: 999px;
      padding: 5px 12px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all .2s;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, var(--hero-from) 0%, var(--hero-to) 100%);
      padding: 64px 24px 56px; text-align: center; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(200,169,110,.12) 0%, transparent 65%);
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 20px; position: relative;
    }
    .hero-eyebrow::before, .hero-eyebrow::after {
      content: ''; display: block; width: 28px; height: 1px; background: var(--accent); opacity: .5;
    }
    .hero-date { font-size: 13px; color: rgba(255,255,255,.45); margin-bottom: 6px; position: relative; }
    .hero-topic {
      font-family: var(--font-serif); font-size: clamp(28px, 5vw, 46px);
      font-weight: 700; color: #fff; line-height: 1.25; max-width: 700px;
      margin: 0 auto 16px; position: relative;
    }
    .hero-headline {
      font-size: clamp(14px, 2.5vw, 17px); color: rgba(255,255,255,.65);
      max-width: 540px; margin: 0 auto; line-height: 1.6; position: relative;
    }

    /* ===== MAIN ===== */
    .main { max-width: 780px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ===== LEAD ===== */
    .lead-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px 36px; margin-bottom: 28px; box-shadow: var(--shadow);
      border-left: 4px solid var(--accent);
    }
    .lead-text {
      font-family: var(--font-serif); font-size: 17px; line-height: 1.8;
      color: var(--text2); font-style: italic;
    }

    /* ===== SECTIONS ===== */
    .section-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px 32px; margin-bottom: 20px; box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
    }
    .section-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    .section-num { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
    .section-subtitle {
      font-family: var(--font-serif); font-size: 20px; font-weight: 700;
      color: var(--text); margin-bottom: 12px; line-height: 1.3;
    }
    .section-content { font-size: 15px; color: var(--text2); line-height: 1.85; }

    /* ===== INSIGHT ===== */
    .insight-card {
      background: linear-gradient(135deg, #1a2e45 0%, #0d3a5c 100%);
      border-radius: var(--radius); padding: 32px 36px; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    [data-theme="dark"] .insight-card { background: linear-gradient(135deg, #0a1a28 0%, #051520 100%); }
    .insight-card::before {
      content: '💡'; position: absolute; right: 24px; top: 20px; font-size: 48px; opacity: .12;
    }
    .insight-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px;
    }
    .insight-text { font-size: 16px; color: rgba(255,255,255,.9); line-height: 1.75; font-weight: 500; }

    /* ===== FUN FACT ===== */
    .funfact-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px 28px; margin-bottom: 28px;
      display: flex; gap: 16px; align-items: flex-start;
    }
    .funfact-icon { font-size: 32px; line-height: 1; flex-shrink: 0; }
    .funfact-label { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .funfact-text { font-size: 14px; color: var(--text2); line-height: 1.7; }

    /* ===== KEYWORDS ===== */
    .keywords { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .keyword {
      background: var(--border); color: var(--text2); border-radius: 999px;
      padding: 4px 12px; font-size: 12px; font-weight: 500;
    }

    /* ===== LOADING / ERROR ===== */
    .loading-wrap { text-align: center; padding: 100px 20px; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--muted); }

    .error-wrap { text-align: center; padding: 80px 20px; }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-text { font-size: 15px; color: var(--text2); }

    /* skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--border-light, #f0ede8) 50%, var(--border) 75%);
      background-size: 200% 100%; border-radius: 6px;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* ===== FOOTER ===== */
    footer {
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: 28px 24px; text-align: center;
    }
    .footer-text { font-size: 12px; color: var(--muted); }
    .footer-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
    .footer-nav a { font-size: 13px; color: var(--text2); transition: color .2s; }
    .footer-nav a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .lead-card { padding: 24px 20px; }
      .section-card { padding: 22px 20px; }
      .insight-card { padding: 24px 20px; }
      .hero { padding: 48px 20px 40px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">Kanta Daily Brief</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">📰 ニュース</a>
        <a href="world.html" class="nav-link active">🌍 世界特集</a>
        <a href="genius.html" class="nav-link">🧠 天才の脳内</a>
      </div>
      <div class="nav-right">
        <button class="theme-btn" id="theme-btn">🌙 ダーク</button>
      </div>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">世界特集</div>
    <div class="hero-date" id="hero-date">読み込み中...</div>
    <h1 class="hero-topic" id="hero-topic">今日はどこへ？</h1>
    <p class="hero-headline" id="hero-headline">AIが毎日1つの国・文化・社会を深掘りします</p>
  </div>

  <main class="main" id="main-content">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p class="loading-text">記事を読み込んでいます...</p>
    </div>
  </main>

  <footer>
    <div class="footer-nav">
      <a href="index.html">📰 ニュース</a>
      <a href="world.html">🌍 世界特集</a>
      <a href="genius.html">🧠 天才の脳内</a>
    </div>
    <p class="footer-text">Kanta Daily Brief &mdash; AI搭載 毎朝7時（JST）自動更新</p>
  </footer>

  <script>
    /* ===== Theme ===== */
    const btn = document.getElementById('theme-btn');
    const applyTheme = dark => {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      btn.textContent = dark ? '☀️ ライト' : '🌙 ダーク';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    };
    const saved = localStorage.getItem('theme');
    applyTheme(saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches));
    btn.addEventListener('click', () => applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark'));

    /* ===== Render ===== */
    function esc(s) {
      return (s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderContent(data) {
      const dateStr = data.date
        ? (() => {
            const d = new Date(data.date);
            const wd = ['日','月','火','水','木','金','土'];
            return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}曜日）`;
          })()
        : data.generated_at_jst || '';

      document.getElementById('hero-date').textContent = dateStr;
      document.getElementById('hero-topic').textContent = data.topic || '';
      document.getElementById('hero-headline').textContent = data.headline || '';

      const sections = (data.sections || []).map((s, i) => `
        <div class="section-card">
          <div class="section-num">0${i + 1}</div>
          <h2 class="section-subtitle">${esc(s.subtitle)}</h2>
          <p class="section-content">${esc(s.content)}</p>
        </div>`).join('');

      const keywords = (data.related_keywords || []).map(k => `<span class="keyword">${esc(k)}</span>`).join('');

      document.getElementById('main-content').innerHTML = `
        <div class="lead-card">
          <p class="lead-text">${esc(data.lead)}</p>
        </div>
        ${sections}
        <div class="insight-card">
          <div class="insight-label">📌 今日のインサイト</div>
          <p class="insight-text">${esc(data.key_insight)}</p>
        </div>
        <div class="funfact-card">
          <div class="funfact-icon">💡</div>
          <div>
            <div class="funfact-label">へぇ！豆知識</div>
            <p class="funfact-text">${esc(data.fun_fact)}</p>
          </div>
        </div>
        ${keywords ? `<div class="keywords">${keywords}</div>` : ''}
      `;
    }

    async function load() {
      try {
        const res = await fetch('./world_topic.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.topic) throw new Error('no data');
        renderContent(data);
      } catch (e) {
        console.error(e);
        const d = new Date();
        const wd = ['日','月','火','水','木','金','土'];
        document.getElementById('hero-date').textContent =
          `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}曜日）`;
        document.getElementById('hero-topic').textContent = '準備中';
        document.getElementById('hero-headline').textContent = '毎朝7時（JST）に更新されます';
        document.getElementById('main-content').innerHTML = `
          <div class="error-wrap">
            <div class="error-icon">🌍</div>
            <p class="error-text">まだデータがありません。<br>毎朝7時（JST）に自動生成されます。</p>
          </div>`;
      }
    }

    load();
  </script>
</body>
</html>
