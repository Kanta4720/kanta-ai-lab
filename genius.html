<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天才の脳内 — Kanta Daily Brief</title>
  <meta name="description" content="今日の天才は何を考えているのか。AIが推測する「今日の戦略メモ」。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kanta4720.github.io/kanta-ai-lab/genius.html">
  <meta property="og:title" content="天才の脳内 — Kanta Daily Brief">
  <meta property="og:description" content="今日の天才は何を考えているのか。AIが推測する「今日の戦略メモ」。">
  <meta name="twitter:card" content="summary">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --card: #16161f;
      --card2: #1c1c28;
      --text: #f0ede8;
      --text2: #9a9aaa;
      --muted: #555566;
      --border: #252530;
      --gold: #c8a96e;
      --gold2: #e0c080;
      --gold-dim: rgba(200,169,110,.15);
      --shadow: 0 8px 40px rgba(0,0,0,.6);
      --radius: 16px;
      --font-serif: 'Georgia', 'Times New Roman', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    [data-theme="light"] {
      --bg: #f4f3f0; --bg2: #ffffff; --card: #ffffff; --card2: #f9f8f6;
      --text: #1a1a1a; --text2: #5a5a5a; --muted: #9a9a9a;
      --border: #e8e6e1; --shadow: 0 4px 24px rgba(0,0,0,.08);
      --gold-dim: rgba(200,169,110,.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.7; transition: background .3s, color .3s; }
    a { color: inherit; text-decoration: none; }

    /* ===== NAV ===== */
    nav {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; transition: background .3s;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
    }
    .nav-brand { font-family: var(--font-serif); font-size: 17px; font-weight: 700; color: var(--text); }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
      color: var(--text2); transition: all .2s; white-space: nowrap;
    }
    .nav-link:hover { background: var(--border); color: var(--text); }
    .nav-link.active { background: var(--gold); color: #000; }
    .theme-btn {
      background: none; border: 1px solid var(--border); border-radius: 999px;
      padding: 5px 12px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all .2s;
    }
    .theme-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(160deg, #05050a 0%, #0d0d1a 40%, #101020 100%);
      padding: 72px 24px 60px; text-align: center; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -30%; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,169,110,.08) 0%, transparent 65%);
      pointer-events: none;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 28px; position: relative;
    }
    .hero-eyebrow::before, .hero-eyebrow::after {
      content: ''; display: block; width: 32px; height: 1px; background: var(--gold); opacity: .4;
    }
    .hero-emoji { font-size: 64px; margin-bottom: 16px; position: relative; display: block; line-height: 1; }
    .hero-name {
      font-family: var(--font-serif); font-size: clamp(32px, 6vw, 56px);
      font-weight: 700; color: #fff; line-height: 1.15; margin-bottom: 8px; position: relative;
    }
    .hero-role {
      font-size: 14px; color: rgba(255,255,255,.45); letter-spacing: .5px; margin-bottom: 20px; position: relative;
    }
    .mood-badge {
      display: inline-block; background: var(--gold-dim); border: 1px solid rgba(200,169,110,.3);
      color: var(--gold2); border-radius: 999px; padding: 6px 18px;
      font-size: 13px; font-weight: 600; position: relative;
    }

    /* ===== MAIN ===== */
    .main { max-width: 820px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ===== TOP OF MIND ===== */
    .tom-card {
      background: linear-gradient(135deg, rgba(200,169,110,.12) 0%, rgba(200,169,110,.04) 100%);
      border: 1px solid rgba(200,169,110,.25); border-radius: var(--radius);
      padding: 28px 32px; margin-bottom: 32px; position: relative; overflow: hidden;
    }
    .tom-card::before {
      content: '🧠'; position: absolute; right: 20px; top: 16px; font-size: 56px; opacity: .08;
    }
    .tom-label { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .tom-text { font-family: var(--font-serif); font-size: 18px; color: var(--text); line-height: 1.65; font-weight: 500; }

    /* ===== STRATEGY MEMOS ===== */
    .memos-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .memo-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px 28px; margin-bottom: 16px;
      border-left: 3px solid var(--gold);
      transition: transform .2s, box-shadow .2s;
    }
    .memo-card:hover { transform: translateX(4px); box-shadow: var(--shadow); }
    .memo-theme { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .memo-thought { font-size: 15px; color: var(--text2); line-height: 1.8; }

    /* ===== QUOTE ===== */
    .quote-card {
      background: var(--card2); border-radius: var(--radius);
      padding: 36px 40px; margin: 32px 0; text-align: center; position: relative;
    }
    .quote-card::before { content: '\201C'; position: absolute; top: 8px; left: 28px; font-size: 80px; line-height: 1; color: var(--gold); opacity: .2; font-family: var(--font-serif); }
    .quote-text {
      font-family: var(--font-serif); font-size: clamp(17px, 3vw, 22px);
      color: var(--text); line-height: 1.55; font-style: italic; position: relative;
    }
    .quote-attr { font-size: 12px; color: var(--muted); margin-top: 14px; letter-spacing: 1px; }

    /* ===== RISK / OPP ===== */
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .split-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; }
    .split-icon { font-size: 24px; margin-bottom: 10px; display: block; }
    .split-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .split-label.danger { color: #e05555; }
    .split-label.success { color: #4caf7a; }
    .split-text { font-size: 14px; color: var(--text2); line-height: 1.75; }

    /* ===== BLIND SPOT ===== */
    .blind-card {
      background: linear-gradient(135deg, #0d1a2e 0%, #0a1220 100%);
      border-radius: var(--radius); padding: 28px 32px; margin-bottom: 20px;
    }
    [data-theme="light"] .blind-card { background: linear-gradient(135deg, #e8f0fa 0%, #dceaf8 100%); }
    .blind-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .blind-text { font-size: 15px; color: rgba(255,255,255,.8); line-height: 1.8; }
    [data-theme="light"] .blind-text { color: var(--text2); }

    /* ===== DISCLAIMER ===== */
    .disclaimer {
      text-align: center; font-size: 11px; color: var(--muted);
      padding: 16px; border: 1px dashed var(--border); border-radius: 8px; margin-top: 16px;
    }

    /* ===== LOADING / ERROR ===== */
    .loading-wrap { text-align: center; padding: 100px 20px; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--muted); }

    .error-wrap { text-align: center; padding: 80px 20px; }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-text { font-size: 15px; color: var(--text2); }

    /* ===== FOOTER ===== */
    footer {
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: 28px 24px; text-align: center;
    }
    .footer-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
    .footer-nav a { font-size: 13px; color: var(--text2); transition: color .2s; }
    .footer-nav a:hover { color: var(--gold); }
    .footer-text { font-size: 12px; color: var(--muted); }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .split { grid-template-columns: 1fr; }
      .quote-card { padding: 28px 24px; }
      .tom-card { padding: 22px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">Kanta Daily Brief</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">📰 ニュース</a>
        <a href="world.html" class="nav-link">🌍 世界特集</a>
        <a href="genius.html" class="nav-link active">🧠 天才の脳内</a>
      </div>
      <button class="theme-btn" id="theme-btn">☀️ ライト</button>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">今日の天才</div>
    <span class="hero-emoji" id="hero-emoji">🧠</span>
    <h1 class="hero-name" id="hero-name">読み込み中...</h1>
    <p class="hero-role" id="hero-role"></p>
    <span class="mood-badge" id="hero-mood">―</span>
  </div>

  <main class="main" id="main-content">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p class="loading-text">脳内スキャン中...</p>
    </div>
  </main>

  <footer>
    <div class="footer-nav">
      <a href="index.html">📰 ニュース</a>
      <a href="world.html">🌍 世界特集</a>
      <a href="genius.html">🧠 天才の脳内</a>
    </div>
    <p class="footer-text">Kanta Daily Brief &mdash; AI搭載 毎朝7時（JST）自動更新</p>
  </footer>

  <script>
    /* ===== Theme ===== */
    const btn = document.getElementById('theme-btn');
    const applyTheme = dark => {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      btn.textContent = dark ? '☀️ ライト' : '🌙 ダーク';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    };
    const saved = localStorage.getItem('theme');
    // genius page defaults dark
    applyTheme(saved ? saved === 'dark' : true);
    btn.addEventListener('click', () => applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark'));

    /* ===== Render ===== */
    function esc(s) {
      return (s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderContent(data) {
      document.getElementById('hero-emoji').textContent = data.emoji || '🧠';
      document.getElementById('hero-name').textContent = data.person || '';
      document.getElementById('hero-role').textContent = data.role || '';
      document.getElementById('hero-mood').textContent = data.mood_today || '';

      const memos = (data.strategy_memos || []).map(m => `
        <div class="memo-card">
          <div class="memo-theme">${esc(m.theme)}</div>
          <p class="memo-thought">${esc(m.thought)}</p>
        </div>`).join('');

      document.getElementById('main-content').innerHTML = `
        <div class="tom-card">
          <div class="tom-label">🔍 今、頭の中で最大のスペースを占めていること</div>
          <p class="tom-text">${esc(data.top_of_mind)}</p>
        </div>

        <div class="memos-label">今日の戦略メモ</div>
        ${memos}

        <div class="quote-card">
          <p class="quote-text">${esc(data.todays_quote)}</p>
          <p class="quote-attr">— ${esc(data.person)}（AI推測）</p>
        </div>

        <div class="split">
          <div class="split-card">
            <span class="split-icon">⚠️</span>
            <div class="split-label danger">最大のリスク</div>
            <p class="split-text">${esc(data.biggest_risk)}</p>
          </div>
          <div class="split-card">
            <span class="split-icon">🚀</span>
            <div class="split-label success">最大のチャンス</div>
            <p class="split-text">${esc(data.biggest_opportunity)}</p>
          </div>
        </div>

        <div class="blind-card">
          <div class="blind-label">👁 周囲がまだ気づいていないもの</div>
          <p class="blind-text">${esc(data.what_competitors_dont_know)}</p>
        </div>

        <p class="disclaimer">⚠️ このコンテンツはAIによるフィクションです。実在する人物の実際の発言・思想とは関係ありません。エンターテインメントとしてお楽しみください。</p>
      `;
    }

    async function load() {
      try {
        const res = await fetch('./genius.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.person) throw new Error('no data');
        renderContent(data);
      } catch (e) {
        console.error(e);
        document.getElementById('hero-name').textContent = '準備中';
        document.getElementById('hero-role').textContent = '毎朝7時（JST）に更新されます';
        document.getElementById('hero-mood').textContent = '待機中';
        document.getElementById('main-content').innerHTML = `
          <div class="error-wrap">
            <div class="error-icon">🧠</div>
            <p class="error-text">まだデータがありません。<br>毎朝7時（JST）に自動生成されます。</p>
          </div>`;
      }
    }

    load();
  </script>
</body>
</html>
