<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マーケット | Aviation Lease Intelligence</title>
  <meta name="description" content="航空機リース業界の主要指標。リース会社株価・航空会社株・原油・金利をリアルタイムで確認。">
  <style>
    :root {
      --bg: #070e1a;
      --surface: #0d1b2e;
      --surface2: #112240;
      --accent: #1a6fdb;
      --accent2: #2589ff;
      --green: #22c55e;
      --red: #f87171;
      --text: #e2eaf4;
      --text-muted: #7a93b4;
      --border: #1e3a5f;
      --tag-bg: #0a2040;
      --transition: all 0.2s ease;
    }
    [data-theme="light"] {
      --bg: #f0f5fb;
      --surface: #ffffff;
      --surface2: #e4eef8;
      --accent: #1a6fdb;
      --accent2: #1a6fdb;
      --green: #16a34a;
      --red: #dc2626;
      --text: #0d1e30;
      --text-muted: #4a6a8a;
      --border: #c0d4e8;
      --tag-bg: #ddeaf8;
    }
    [data-theme="light"] header { background: rgba(240,245,251,0.97); }
    [data-theme="light"] .logo-area h1 { color: #0d1e30; }
    [data-theme="light"] .hero { background: linear-gradient(135deg, #0f2a5a 0%, #1a4a9a 50%, #1a6fdb 100%); }
    [data-theme="light"] .metric-card { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
    }
    a { color: inherit; text-decoration: none; }

    /* ===== Header ===== */
    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header {
      background: rgba(7,14,26,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      gap: 16px;
    }
    .logo-area h1 { font-size: 1.25rem; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
    .logo-area h1 span { color: var(--accent2); }
    .logo-area p { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; letter-spacing: 0.5px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .update-time { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 11px;
      cursor: pointer;
      font-size: 0.74rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: var(--transition);
      white-space: nowrap;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }

    /* ===== Nav ===== */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .nav-inner::-webkit-scrollbar { display: none; }
    nav a {
      display: inline-flex;
      align-items: center;
      padding: 11px 20px;
      color: var(--text-muted);
      font-size: 0.86rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
    }
    nav a:hover { color: var(--text); border-bottom-color: var(--border); }
    nav a.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    /* ===== Date nav ===== */
    .date-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 9px 20px;
      flex-wrap: wrap;
    }
    .date-nav-btn {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--accent2);
      padding: 4px 12px;
      border: 1px solid rgba(37,137,255,0.3);
      border-radius: 6px;
      transition: var(--transition);
      white-space: nowrap;
    }
    .date-nav-btn:hover { background: rgba(37,137,255,0.1); }
    .date-nav-btn.disabled { color: var(--text-muted); border-color: var(--border); cursor: default; pointer-events: none; opacity: 0.5; }
    .date-nav-current { font-size: 0.85rem; font-weight: 700; color: var(--text); white-space: nowrap; }
    .date-nav-archive { font-size: 0.72rem; color: var(--text-muted); border-left: 1px solid var(--border); padding-left: 14px; }
    .date-nav-archive a { color: var(--accent2); }
    .date-nav-archive a:hover { text-decoration: underline; }

    /* ===== Hero ===== */
    .hero {
      background: linear-gradient(135deg, #040b16 0%, #081630 50%, #0a1e45 100%);
      padding: 36px 24px 30px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(26,111,219,0.07) 0%, transparent 60%);
      animation: pulse 12s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.12)} }
    .hero-label { font-size: 0.65rem; color: var(--accent2); text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 10px; position: relative; }
    .hero-title { font-size: clamp(1.3rem, 3.5vw, 1.9rem); font-weight: 800; color: #fff; margin-bottom: 6px; position: relative; }
    .hero-title span { color: var(--accent2); }
    .hero-desc { font-size: 0.82rem; color: rgba(255,255,255,0.45); position: relative; }

    /* ===== Main ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 72px;
    }

    /* ===== Section ===== */
    .market-section { margin-bottom: 32px; }
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-note { font-size: 0.65rem; color: var(--text-muted); white-space: nowrap; }

    /* ===== Metric cards grid ===== */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 10px;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.2s, transform 0.15s;
      cursor: default;
    }
    .metric-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .mc-symbol {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .mc-name {
      font-size: 0.78rem;
      color: var(--text);
      font-weight: 600;
      line-height: 1.2;
    }
    .mc-price {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
      margin-top: 6px;
    }
    .mc-unit { font-size: 0.68rem; font-weight: 400; color: var(--text-muted); margin-left: 2px; }
    .mc-change {
      font-size: 0.78rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .mc-change.up   { color: var(--green); }
    .mc-change.down { color: var(--red); }
    .mc-change.flat { color: var(--text-muted); }
    .mc-arrow { font-size: 0.65rem; }
    .mc-date { font-size: 0.62rem; color: var(--text-muted); margin-top: 4px; }

    /* Rate cards are slightly different */
    .metric-card.rate .mc-price { font-size: 1.5rem; color: var(--accent2); }

    /* ===== Disclaimer ===== */
    .disclaimer {
      margin-top: 24px;
      font-size: 0.68rem;
      color: var(--text-muted);
      line-height: 1.8;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    /* ===== Footer ===== */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    /* ===== Error ===== */
    .error-msg { text-align: center; padding: 60px 24px; color: var(--text-muted); font-size: 0.9rem; }

    /* ===== Mobile ===== */
    @media (max-width: 640px) {
      .logo-area p, .update-time { display: none; }
      .header-inner { padding: 10px 16px; }
      nav a { padding: 11px 14px; font-size: 0.82rem; }
      main { padding: 20px 14px 60px; }
      .metric-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .mc-price { font-size: 1.1rem; }
      .metric-card { padding: 12px 12px; }
    }
  </style>
</head>
<body>

<div class="sticky-top">
<header>
  <div class="header-inner">
    <div class="logo-area">
      <h1>✈ Aviation <span>Lease</span> Intelligence</h1>
      <p>AIRCRAFT LEASING INDUSTRY · AI-POWERED DAILY BRIEF</p>
    </div>
    <div class="header-right">
      <div class="update-time" id="update-time"></div>
      <button class="theme-toggle" id="theme-toggle" aria-label="テーマ切替">
        <span id="theme-icon">☀</span>
        <span id="theme-label">ライト</span>
      </button>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <a href="./index.html">📰 ニュース</a>
    <a href="./features.html">📖 特集記事</a>
    <a href="./market.html" class="active">📊 マーケット</a>
    <a href="./archive.html">📅 アーカイブ</a>
  </div>
</nav>
</div>

<div id="date-nav"></div>

<div class="hero">
  <div class="hero-label">MARKET DATA</div>
  <h2 class="hero-title">航空業界<span>マーケット概況</span></h2>
  <p class="hero-desc">リース会社・主要航空株・原油・金利・為替を毎朝更新</p>
</div>

<main>
  <div id="app"><p class="error-msg">読み込み中...</p></div>
</main>

<footer>
  Aviation Lease Intelligence — AI-Powered Daily Brief<br>
  株価は前日終値。原油はNYMEX先物。データはyfinance / NY Fedより取得。投資判断の根拠には使用しないでください。
</footer>

<script>
  // Theme
  const saved = localStorage.getItem('aviation-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  function updateThemeBtn() {
    const dark = document.documentElement.getAttribute('data-theme') !== 'light';
    document.getElementById('theme-icon').textContent  = dark ? '☀' : '🌙';
    document.getElementById('theme-label').textContent = dark ? 'ライト' : 'ダーク';
  }
  updateThemeBtn();
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const cur  = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('aviation-theme', next);
    updateThemeBtn();
  });

  // ---- Formatting helpers ----
  function fmtPrice(price, currency) {
    if (currency === 'JPY') return '¥' + price.toLocaleString('ja-JP');
    if (currency === 'HKD') return 'HK$' + price.toFixed(2);
    if (currency === 'EUR') return '€'   + price.toFixed(2);
    return '$' + price.toFixed(2);
  }

  function changeHtml(pct, abs, unit) {
    if (pct === null && abs === null) return '';
    const val = pct !== null ? pct : abs;
    const label = pct !== null
      ? (pct > 0 ? '+' : '') + pct.toFixed(2) + '%'
      : (abs > 0 ? '+' : '') + abs.toFixed(3) + 'pt';
    const cls  = val > 0 ? 'up' : val < 0 ? 'down' : 'flat';
    const arrow = val > 0 ? '▲' : val < 0 ? '▼' : '—';
    return `<div class="mc-change ${cls}"><span class="mc-arrow">${arrow}</span>${label}</div>`;
  }

  // ---- Card builders ----
  function stockCard(s) {
    return `<div class="metric-card">
      <div class="mc-symbol">${s.symbol}</div>
      <div class="mc-name">${s.name}</div>
      <div class="mc-price">${fmtPrice(s.price, s.currency)}</div>
      ${changeHtml(s.change_pct, null, null)}
      <div class="mc-date">${s.date || ''}</div>
    </div>`;
  }

  function rateCard(r) {
    const chg = r.change !== undefined && r.change !== null ? r.change : null;
    return `<div class="metric-card rate">
      <div class="mc-symbol">${r.unit}</div>
      <div class="mc-name">${r.name}</div>
      <div class="mc-price">${r.value.toFixed(2)}<span class="mc-unit">%</span></div>
      ${changeHtml(null, chg, 'pt')}
      <div class="mc-date">${r.date || ''}</div>
    </div>`;
  }

  function commodityCard(c) {
    return `<div class="metric-card">
      <div class="mc-symbol">${c.unit}</div>
      <div class="mc-name">${c.name}</div>
      <div class="mc-price">$${c.price.toFixed(2)}</div>
      ${changeHtml(c.change_pct, null, null)}
      <div class="mc-date">${c.date || ''}</div>
    </div>`;
  }

  function fxCard(f) {
    const dp = f.symbol === 'USD/JPY' ? 2 : 4;
    return `<div class="metric-card">
      <div class="mc-symbol">${f.symbol}</div>
      <div class="mc-name">${f.name}</div>
      <div class="mc-price">${f.price.toFixed(dp)}</div>
      ${changeHtml(f.change_pct, null, null)}
      <div class="mc-date">${f.date || ''}</div>
    </div>`;
  }

  function section(label, note, cards) {
    if (!cards || cards.length === 0) return '';
    return `<div class="market-section">
      <div class="section-head">
        <span class="section-label">${label}</span>
        <div class="section-line"></div>
        ${note ? `<span class="section-note">${note}</span>` : ''}
      </div>
      <div class="metric-grid">${cards}</div>
    </div>`;
  }

  // ---- Date nav ----
  function renderDateNav(currentDate, dates) {
    const el = document.getElementById('date-nav');
    if (!el) return;
    if (dates.length === 0 && !currentDate) { el.style.display = 'none'; return; }

    const idx = currentDate ? dates.indexOf(currentDate) : -1;
    const prevDate = currentDate ? (dates[idx + 1] || null) : (dates[0] || null);
    const nextDate = currentDate ? (idx > 0 ? dates[idx - 1] : null) : null;

    const fmt = d => { if (!d) return '最新'; const [y,m,dd] = d.split('-').map(Number); return `${y}年${m}月${dd}日`; };
    const prevHtml = prevDate
      ? `<a class="date-nav-btn" href="./market.html?date=${prevDate}">← 前の日</a>`
      : `<span class="date-nav-btn disabled">← 前の日</span>`;
    const nextHtml = currentDate
      ? (nextDate
          ? `<a class="date-nav-btn" href="./market.html?date=${nextDate}">次の日 →</a>`
          : `<a class="date-nav-btn" href="./market.html">最新へ →</a>`)
      : `<span class="date-nav-btn disabled">次の日 →</span>`;

    el.innerHTML = `<div class="date-nav">
      ${prevHtml}
      <span class="date-nav-current">${fmt(currentDate)}</span>
      ${nextHtml}
      <span class="date-nav-archive"><a href="./archive.html">📅 一覧</a></span>
    </div>`;
  }

  // ---- Load & render ----
  async function loadMarket() {
    const app = document.getElementById('app');
    const params    = new URLSearchParams(window.location.search);
    const dateParam = params.get('date');
    const jsonUrl   = dateParam ? `./archive/market_${dateParam}.json` : './market_data.json';

    fetch('./archive/index.json').then(r => r.json()).then(d => {
      renderDateNav(dateParam, d.dates || []);
    }).catch(() => renderDateNav(dateParam, []));

    try {
      const res = await fetch(jsonUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();

      document.getElementById('update-time').textContent = `更新: ${d.updated_at_jst || ''}`;

      const html =
        section('リース会社株', 'NYSE前日終値',
          (d.lessor_stocks  || []).map(stockCard).join('')) +
        section('主要航空株', 'NYSE / 東証前日終値',
          (d.airline_stocks || []).map(stockCard).join('')) +
        section('製造会社株', 'NYSE / Euronext前日終値',
          (d.mfr_stocks     || []).map(stockCard).join('')) +
        section('金利・レート', 'SOFR: NY Fed / EURIBOR: ECB / 米国債: CBOE',
          (d.rates          || []).map(rateCard).join('')) +
        section('為替', '前営業日終値',
          (d.fx_rates       || []).map(fxCard).join('')) +
        section('原油先物', 'NYMEX前日終値（航空燃料コストの代替指標）',
          (d.commodities    || []).map(commodityCard).join('')) +
        `<div class="disclaimer">
          ※ 株価・金利・為替は前営業日終値。原油はNYMEX先物。<br>
          本データは情報提供のみを目的としており、投資判断の根拠への使用はご遠慮ください。
        </div>`;

      app.innerHTML = html || '<p class="error-msg">データがありません。</p>';
    } catch (err) {
      console.error(err);
      app.innerHTML = `<p class="error-msg">データの読み込みに失敗しました。<br><small>${err.message}</small></p>`;
    }
  }

  loadMarket();
</script>
</body>
</html>
