<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aviation Lease Intelligence</title>
  <style>
    :root {
      --bg: #070e1a;
      --surface: #0d1b2e;
      --surface2: #112240;
      --accent: #1a6fdb;
      --accent2: #2589ff;
      --text: #e2eaf4;
      --text-muted: #7a93b4;
      --border: #1e3a5f;
      --tag-bg: #0a2040;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #050c18 0%, #0a1e38 50%, #0d2550 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 14px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo-area h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-area h1 span { color: var(--accent2); }
    .logo-area p {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .date-badge {
      background: rgba(26, 111, 219, 0.15);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--accent2);
      white-space: nowrap;
    }

    /* Nav */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 0;
    }
    nav a {
      display: inline-block;
      padding: 12px 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    nav a:hover { color: var(--text); border-bottom-color: var(--border); }
    nav a.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    /* Main */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* Section titles */
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Brief cards */
    .brief-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }
    .brief-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, transform 0.15s;
    }
    .brief-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .tag-Lease-Market { background: rgba(26,111,219,0.18); border-color: #1a6fdb; color: #5aabff; }
    .tag-Fleet-Orders { background: rgba(16,185,129,0.15); border-color: #059669; color: #34d399; }
    .tag-Airline-Finance { background: rgba(245,158,11,0.15); border-color: #d97706; color: #fbbf24; }
    .tag-Regulations { background: rgba(239,68,68,0.15); border-color: #dc2626; color: #f87171; }
    .tag-Geopolitics { background: rgba(168,85,247,0.15); border-color: #9333ea; color: #c084fc; }
    .tag-Sustainability { background: rgba(20,184,166,0.15); border-color: #0d9488; color: #2dd4bf; }

    .source-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-left: auto;
    }
    .card-title {
      font-size: 0.98rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text);
    }
    .card-title a {
      color: inherit;
      text-decoration: none;
    }
    .card-title a:hover { color: var(--accent2); }
    .card-summary {
      font-size: 0.84rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .card-insights {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .card-insights.open { display: flex; }
    .insight-block { display: flex; flex-direction: column; gap: 4px; }
    .insight-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent2);
    }
    .insight-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .expand-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 5px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      align-self: flex-start;
      transition: all 0.2s;
    }
    .expand-btn:hover {
      border-color: var(--accent);
      color: var(--accent2);
    }
    .expand-btn.open { border-color: var(--accent); color: var(--accent2); }
    .expand-icon {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 0.65rem;
    }
    .expand-btn.open .expand-icon { transform: rotate(180deg); }

    /* Category filter */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    /* All articles list */
    .article-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 48px;
    }
    .article-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .article-row:hover { border-color: var(--accent); }
    .article-row-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }
    .article-row-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 200px;
    }
    .article-row-title a { color: inherit; text-decoration: none; }
    .article-row-title a:hover { color: var(--accent2); }
    .article-row-summary {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Lease section */
    .lease-section {
      background: linear-gradient(135deg, rgba(26,111,219,0.08) 0%, rgba(26,111,219,0.03) 100%);
      border: 1px solid rgba(26,111,219,0.3);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 48px;
    }
    .lease-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5aabff;
      margin-bottom: 16px;
    }

    /* Loading / error */
    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
      font-size: 0.9rem;
    }
    .error-card {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 24px;
      color: #f87171;
      text-align: center;
    }

    /* Footer */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      .brief-grid { grid-template-columns: 1fr; }
      .brief-card.featured { flex-direction: column; }
      header { position: static; }
      nav { position: sticky; top: 0; z-index: 100; }
      .update-time { display: none; }
      .logo-area p { display: none; }
      nav a { padding: 10px 14px; font-size: 0.82rem; }
      .header-inner { padding: 10px 16px; }
      main { padding: 20px 14px 60px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <h1>✈ Aviation <span>Lease</span> Intelligence</h1>
      <p>航空機リース業界の最新ニュース・分析 | AI-Powered Daily Brief</p>
    </div>
    <div class="date-badge" id="date-badge">読み込み中...</div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <a href="./index.html" class="active">📰 ニュース</a>
    <a href="./world.html">🌍 航空トピック</a>
  </div>
</nav>

<main>
  <div id="app">
    <div class="loading">ニュースを読み込み中...</div>
  </div>
</main>

<footer>
  <p>Aviation Lease Intelligence &mdash; Powered by AI | データは自動収集・AI分析によるものです</p>
  <p style="margin-top:6px;">本サイトの情報は参考目的であり、投資・取引判断の根拠として使用しないでください。</p>
</footer>

<script>
const CATEGORIES = ["Lease Market", "Fleet & Orders", "Airline Finance", "Regulations", "Geopolitics", "Sustainability"];

const catJa = {
  all: 'すべて',
  'Lease Market': 'リース市場',
  'Fleet & Orders': 'フリート・発注',
  'Airline Finance': '航空会社財務',
  Regulations: '規制・安全',
  Geopolitics: '地政学',
  Sustainability: '持続可能性'
};

function formatDateJa(str) {
  if (!str) return '';
  const d = new Date(str.replace(' ', 'T') + '+09:00');
  if (isNaN(d)) return str;
  const parts = new Intl.DateTimeFormat('ja-JP', {
    timeZone: 'Asia/Tokyo',
    year: 'numeric', month: 'numeric', day: 'numeric', weekday: 'long'
  }).formatToParts(d);
  const get = t => (parts.find(p => p.type === t) || {}).value || '';
  return `${get('year')}年${get('month')}月${get('day')}日（${get('weekday')}）`;
}

function todayJa() {
  const parts = new Intl.DateTimeFormat('ja-JP', {
    timeZone: 'Asia/Tokyo',
    year: 'numeric', month: 'numeric', day: 'numeric', weekday: 'long'
  }).formatToParts(new Date());
  const get = t => (parts.find(p => p.type === t) || {}).value || '';
  return `${get('year')}年${get('month')}月${get('day')}日（${get('weekday')}）`;
}

function tagClass(cat) {
  const map = {
    'Lease Market': 'tag-Lease-Market',
    'Fleet & Orders': 'tag-Fleet-Orders',
    'Airline Finance': 'tag-Airline-Finance',
    'Regulations': 'tag-Regulations',
    'Geopolitics': 'tag-Geopolitics',
    'Sustainability': 'tag-Sustainability'
  };
  return map[cat] || '';
}

function toggleCard(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.classList.toggle('open');
  btn.classList.toggle('open', open);
  const label = btn.querySelector('.expand-label');
  if (label) label.textContent = open ? '閉じる' : '分析を見る';
}

function briefCard(article, idx) {
  const tc = tagClass(article.category);
  const hasInsights = article.why_it_matters || article.lease_impact;
  const insights = hasInsights ? `
    <div class="card-insights" id="insights-${idx}">
      ${article.why_it_matters ? `<div class="insight-block"><span class="insight-label">なぜ重要か</span><span class="insight-text">${article.why_it_matters}</span></div>` : ''}
      ${article.lease_impact ? `<div class="insight-block"><span class="insight-label">リース業界への影響</span><span class="insight-text">${article.lease_impact}</span></div>` : ''}
    </div>` : '';
  const expandBtn = hasInsights ? `
    <button class="expand-btn" onclick="toggleCard(this, 'insights-${idx}')">
      <span class="expand-label">分析を見る</span> <span class="expand-icon">&#9660;</span>
    </button>` : '';
  return `
    <div class="brief-card">
      <div class="card-meta">
        <span class="tag ${tc}">${article.category}</span>
        <span class="source-label">${article.source || ''}</span>
      </div>
      <div class="card-title"><a href="${article.url}" target="_blank" rel="noopener">${article.title}</a></div>
      <div class="card-summary">${article.summary_2lines || ''}</div>
      ${insights}
      ${expandBtn}
    </div>`;
}

function articleRow(article, idx) {
  const tc = tagClass(article.category);
  const hasInsights = article.why_it_matters || article.lease_impact;
  const insights = hasInsights ? `
    <div class="card-insights" id="row-insights-${idx}">
      ${article.why_it_matters ? `<div class="insight-block"><span class="insight-label">なぜ重要か</span><span class="insight-text">${article.why_it_matters}</span></div>` : ''}
      ${article.lease_impact ? `<div class="insight-block"><span class="insight-label">リース業界への影響</span><span class="insight-text">${article.lease_impact}</span></div>` : ''}
    </div>` : '';
  const expandBtn = hasInsights ? `
    <button class="expand-btn" onclick="toggleCard(this, 'row-insights-${idx}')">
      <span class="expand-label">分析を見る</span> <span class="expand-icon">&#9660;</span>
    </button>` : '';
  return `
    <div class="article-row" data-cat="${article.category}">
      <div class="article-row-top">
        <span class="tag ${tc}">${article.category}</span>
        <div class="article-row-title"><a href="${article.url}" target="_blank" rel="noopener">${article.title}</a></div>
        <span class="source-label">${article.source || ''}</span>
      </div>
      <div class="article-row-summary">${article.summary_2lines || ''}</div>
      ${insights}
      ${expandBtn}
    </div>`;
}

let currentFilter = 'all';
let allArticles = [];

function applyFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  document.querySelectorAll('.article-row').forEach(row => {
    if (cat === 'all' || row.dataset.cat === cat) {
      row.style.display = '';
    } else {
      row.style.display = 'none';
    }
  });
}

async function loadNews() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('./news.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    document.getElementById('date-badge').textContent = formatDateJa(data.generated_at_jst) || todayJa();

    const brief = data.todays_brief || [];
    const cats = data.categories || {};

    // Collect all articles
    allArticles = [];
    CATEGORIES.forEach(cat => {
      (cats[cat] || []).forEach(a => allArticles.push(a));
    });
    // Fall back to brief if categories are all empty
    if (allArticles.length === 0 && brief.length > 0) {
      allArticles = [...brief];
    }

    // Lease Market articles
    const leaseArticles = (cats['Lease Market'] || []);

    let html = '';

    // Today's Brief
    if (brief.length > 0) {
      html += `<div class="section-title">Today's Brief &mdash; 本日の重要ニュース TOP${brief.length}</div>`;
      html += `<div class="brief-grid">`;
      brief.forEach((a, i) => { html += briefCard(a, i); });
      html += `</div>`;
    }

    // Lease Market focus
    if (leaseArticles.length > 0) {
      html += `<div class="lease-section">`;
      html += `<div class="lease-section-title">✈ リース市場フォーカス</div>`;
      html += `<div class="article-list" id="lease-container">`;
      leaseArticles.forEach((a, i) => { html += articleRow(a, 9000 + i); });
      html += `</div></div>`;
    }

    // All articles with filter
    if (allArticles.length > 0) {
      html += `<div class="section-title">すべてのニュース</div>`;
      html += `<div class="filter-bar">`;
      html += `<button class="filter-btn active" data-cat="all" onclick="applyFilter('all')">${catJa['all']}</button>`;
      CATEGORIES.forEach(cat => {
        html += `<button class="filter-btn" data-cat="${cat}" onclick="applyFilter('${cat}')">${catJa[cat] || cat}</button>`;
      });
      html += `</div>`;
      html += `<div class="article-list">`;
      allArticles.forEach((a, i) => { html += articleRow(a, 1000 + i); });
      html += `</div>`;
    }

    if (!html) {
      html = `<div class="error-card"><p>本日のニュースはまだ準備中です。</p></div>`;
    }

    app.innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById('date-badge').textContent = todayJa();
    app.innerHTML = `
      <div class="error-card">
        <p>ニュースの読み込みに失敗しました。</p>
        <p style="font-size:0.8rem;margin-top:8px;opacity:0.7;">${err.message}</p>
      </div>`;
  }
}

loadNews();
</script>
</body>
</html>
