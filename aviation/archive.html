<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アーカイブ | Aviation Lease Intelligence</title>
  <style>
    :root {
      --bg: #070e1a;
      --surface: #0d1b2e;
      --surface2: #112240;
      --accent: #1a6fdb;
      --accent2: #2589ff;
      --text: #e2eaf4;
      --text-muted: #7a93b4;
      --border: #1e3a5f;
      --tag-bg: #0a2040;
      --transition: all 0.2s ease;
    }
    [data-theme="light"] {
      --bg: #f0f5fb;
      --surface: #ffffff;
      --surface2: #e4eef8;
      --accent: #1a6fdb;
      --accent2: #1a6fdb;
      --text: #0d1e30;
      --text-muted: #4a6a8a;
      --border: #c0d4e8;
      --tag-bg: #ddeaf8;
    }
    [data-theme="light"] header { background: rgba(240,245,251,0.92); }
    [data-theme="light"] .logo-area h1 { color: #0d1e30; }
    [data-theme="light"] .hero { background: linear-gradient(135deg, #0f2a5a 0%, #1a4a9a 50%, #1a6fdb 100%); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    a { color: inherit; text-decoration: none; }

    /* Header */
    header {
      background: rgba(7,14,26,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      gap: 16px;
    }
    .logo-area h1 { font-size: 1.25rem; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
    .logo-area h1 span { color: var(--accent2); }
    .logo-area p { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; letter-spacing: 0.5px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 11px;
      cursor: pointer;
      font-size: 0.74rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: var(--transition);
      white-space: nowrap;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }

    /* Nav */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner { max-width: 1000px; margin: 0 auto; display: flex; }
    nav a {
      display: inline-block;
      padding: 11px 22px;
      color: var(--text-muted);
      font-size: 0.86rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
    }
    nav a:hover { color: var(--text); border-bottom-color: var(--border); }
    nav a.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #040b16 0%, #081630 50%, #0a1e45 100%);
      padding: 40px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .hero-label {
      font-size: 0.68rem;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 2.5px;
      margin-bottom: 12px;
    }
    .hero-title {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }
    .hero-title span { color: var(--accent2); }
    .hero-desc { font-size: 0.83rem; color: rgba(255,255,255,0.45); }

    /* Main */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 36px 24px 72px;
    }

    /* Month group */
    .month-group { margin-bottom: 40px; }
    .month-header {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .month-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Date grid */
    .date-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .date-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      transition: var(--transition);
    }
    .date-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .date-display {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }
    .day-of-week {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
    }
    .date-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .date-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--accent2);
      border: 1px solid rgba(37,137,255,0.25);
      border-radius: 6px;
      padding: 5px 10px;
      transition: var(--transition);
    }
    .date-link:hover { background: rgba(37,137,255,0.1); border-color: var(--accent2); }
    .date-link.no-features { color: var(--text-muted); border-color: var(--border); pointer-events: none; opacity: 0.5; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .empty-state p { font-size: 0.9rem; line-height: 2; }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 16px; }

    /* Footer */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    @media (max-width: 640px) {
      header { position: static; }
      nav { position: sticky; top: 0; z-index: 100; }
      .logo-area p { display: none; }
      .header-inner { padding: 10px 16px; }
      nav a { padding: 10px 12px; font-size: 0.8rem; }
      .date-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      main { padding: 24px 14px 60px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <h1>✈ Aviation <span>Lease</span> Intelligence</h1>
      <p>AIRCRAFT LEASING INDUSTRY · AI-POWERED DAILY BRIEF</p>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle" aria-label="テーマ切替">
        <span id="theme-icon">☀</span>
        <span id="theme-label">ライト</span>
      </button>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <a href="./index.html">📰 ニュース</a>
    <a href="./world.html">🌍 航空トピック</a>
    <a href="./features.html">📖 特集記事</a>
    <a href="./market.html">📊 マーケット</a>
    <a href="./archive.html" class="active">📅 アーカイブ</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">ARCHIVE</div>
  <h2 class="hero-title">過去の<span>ニュースアーカイブ</span></h2>
  <p class="hero-desc">過去のニュースブリーフと特集記事を日付から閲覧できます</p>
</div>

<main>
  <div id="app"><p style="color:var(--text-muted);text-align:center;padding:60px 0;">読み込み中...</p></div>
</main>

<footer>
  Aviation Lease Intelligence — AI-Powered Daily Brief<br>
  データはOpenAI APIおよびNewsAPIにより毎朝自動生成されます
</footer>

<script>
  // Theme
  const saved = localStorage.getItem('aviation-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  function updateThemeBtn() {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    document.getElementById('theme-icon').textContent  = isDark ? '☀' : '🌙';
    document.getElementById('theme-label').textContent = isDark ? 'ライト' : 'ダーク';
  }
  updateThemeBtn();
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('aviation-theme', next);
    updateThemeBtn();
  });

  const DOW_JA = ['日', '月', '火', '水', '木', '金', '土'];

  function formatDateLabel(d) {
    const [y, m, day] = d.split('-').map(Number);
    const dow = DOW_JA[new Date(d + 'T00:00:00').getDay()];
    return { y, m, day, dow };
  }

  async function loadArchive() {
    const app = document.getElementById('app');
    try {
      const res = await fetch('./archive/index.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { dates } = await res.json();

      if (!dates || dates.length === 0) {
        app.innerHTML = `
          <div class="empty-state">
            <div class="emoji">📭</div>
            <p>アーカイブはまだありません。<br>毎朝7時（JST）の自動更新後から蓄積が始まります。</p>
          </div>`;
        return;
      }

      // Group by YYYY-MM
      const byMonth = {};
      dates.forEach(d => {
        const key = d.slice(0, 7);
        if (!byMonth[key]) byMonth[key] = [];
        byMonth[key].push(d);
      });

      let html = '';
      for (const [monthKey, days] of Object.entries(byMonth)) {
        const [y, m] = monthKey.split('-').map(Number);
        html += `<div class="month-group">
          <div class="month-header">${y}年${m}月</div>
          <div class="date-grid">`;
        for (const d of days) {
          const { m: dm, day, dow } = formatDateLabel(d);
          html += `<div class="date-card">
            <div class="date-display">${dm}月${day}日 <span class="day-of-week">（${dow}）</span></div>
            <div class="date-links">
              <a class="date-link" href="./index.html?date=${d}">📰 ニュース</a>
              <a class="date-link" href="./features.html?date=${d}">📖 特集記事</a>
            </div>
          </div>`;
        }
        html += `</div></div>`;
      }

      app.innerHTML = html;
    } catch (err) {
      app.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:60px 0;">読み込みに失敗しました: ${err.message}</p>`;
    }
  }

  loadArchive();
</script>
</body>
</html>
