<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>航空トピック深掘り | Aviation Lease Intelligence</title>
  <style>
    :root {
      --bg: #070e1a;
      --surface: #0d1b2e;
      --surface2: #112240;
      --accent: #1a6fdb;
      --accent2: #2589ff;
      --text: #e2eaf4;
      --text-muted: #7a93b4;
      --border: #1e3a5f;
    }
    [data-theme="light"] {
      --bg: #f0f5fb;
      --surface: #ffffff;
      --surface2: #e4eef8;
      --accent: #1a6fdb;
      --accent2: #1a6fdb;
      --text: #0d1e30;
      --text-muted: #4a6a8a;
      --border: #c0d4e8;
    }
    [data-theme="light"] header { background: linear-gradient(135deg, #0f2a5a 0%, #1a4a9a 50%, #1a6fdb 100%); }
    [data-theme="light"] .lead-card { background: linear-gradient(135deg, rgba(26,111,219,0.08) 0%, rgba(26,111,219,0.02) 100%); }
    [data-theme="light"] .lease-insight-card { background: linear-gradient(135deg, rgba(26,111,219,0.1) 0%, rgba(26,111,219,0.03) 100%); }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    header {
      background: linear-gradient(135deg, #050c18 0%, #0a1e38 50%, #0d2550 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 14px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo-area h1 { font-size: 1.5rem; font-weight: 800; color: #fff; }
    .logo-area h1 span { color: var(--accent2); }
    .logo-area p { font-size: 0.72rem; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .date-badge {
      background: rgba(26, 111, 219, 0.15);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: #a0d0ff;
      white-space: nowrap;
    }
    .theme-toggle {
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 5px 11px;
      cursor: pointer;
      font-size: 0.74rem;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .theme-toggle:hover { border-color: rgba(255,255,255,0.6); color: #fff; }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
    }
    nav a {
      display: inline-block;
      padding: 12px 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    nav a:hover { color: var(--text); border-bottom-color: var(--border); }
    nav a.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* News connection badge */
    .news-connection {
      display: inline-block;
      background: rgba(26, 111, 219, 0.15);
      border: 1px solid rgba(26, 111, 219, 0.4);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.72rem;
      color: var(--accent2);
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    .topic-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 12px;
    }

    h2.topic-title {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 10px;
      color: #fff;
    }

    .topic-headline {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 32px;
      font-style: italic;
    }

    /* Lead card */
    .lead-card {
      background: linear-gradient(135deg, rgba(26,111,219,0.12) 0%, rgba(26,111,219,0.04) 100%);
      border: 1px solid rgba(26,111,219,0.3);
      border-radius: 14px;
      padding: 28px;
      font-size: 0.98rem;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 36px;
    }

    /* Section cards */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .section-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-card h3::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 1.1rem;
      background: var(--accent2);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .section-card p {
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--text-muted);
    }

    /* Lease insight */
    .lease-insight-card {
      background: linear-gradient(135deg, rgba(26,111,219,0.15) 0%, rgba(26,111,219,0.05) 100%);
      border: 1px solid rgba(26,111,219,0.4);
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 20px;
    }
    .lease-insight-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5aabff;
      margin-bottom: 10px;
    }
    .lease-insight-card p {
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--text);
    }

    /* Key takeaway */
    .takeaway-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent2);
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 32px;
    }
    .takeaway-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 8px;
    }
    .takeaway-card p {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text);
    }

    /* Keywords */
    .keywords-section { margin-bottom: 48px; }
    .keywords-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .keyword-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .keyword-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 80px 20px;
      font-size: 0.9rem;
    }
    .error-card {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 24px;
      color: #f87171;
      text-align: center;
    }

    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      h2.topic-title { font-size: 1.5rem; }
      nav a { padding: 10px 16px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <h1>✈ Aviation <span>Lease</span> Intelligence</h1>
      <p>航空機リース業界の最新ニュース・分析 | AI-Powered Daily Brief</p>
    </div>
    <div class="header-right">
      <div class="date-badge" id="date-badge">読み込み中...</div>
      <button class="theme-toggle" id="theme-toggle" aria-label="テーマ切替">
        <span id="theme-icon">☀</span>
        <span id="theme-label">ライト</span>
      </button>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <a href="./index.html">📰 ニュース</a>
    <a href="./world.html" class="active">🌍 航空トピック</a>
  </div>
</nav>

<main>
  <div id="app">
    <div class="loading">トピックを読み込み中...</div>
  </div>
</main>

<footer>
  <p>Aviation Lease Intelligence &mdash; Powered by AI | データは自動収集・AI分析によるものです</p>
  <p style="margin-top:6px;">本サイトの情報は参考目的であり、投資・取引判断の根拠として使用しないでください。</p>
</footer>

<script>
  /* ===== Theme toggle ===== */
  (function() {
    const toggle = document.getElementById('theme-toggle');
    const tIcon  = document.getElementById('theme-icon');
    const tLabel = document.getElementById('theme-label');
    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      tIcon.textContent  = dark ? '☀' : '🌙';
      tLabel.textContent = dark ? 'ライト' : 'ダーク';
      localStorage.setItem('aviation-theme', dark ? 'dark' : 'light');
    }
    const saved   = localStorage.getItem('aviation-theme');
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved === 'light' ? false : (saved === 'dark' ? true : sysDark));
    toggle.addEventListener('click', () => {
      applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
    });
  })();

function formatDateJa(str) {
  if (!str) return '';
  const d = new Date(str.replace(' ', 'T') + '+09:00');
  if (isNaN(d)) return str;
  const parts = new Intl.DateTimeFormat('ja-JP', {
    timeZone: 'Asia/Tokyo',
    year: 'numeric', month: 'numeric', day: 'numeric', weekday: 'long'
  }).formatToParts(d);
  const get = t => (parts.find(p => p.type === t) || {}).value || '';
  return `${get('year')}年${get('month')}月${get('day')}日（${get('weekday')}）`;
}

function todayJa() {
  const parts = new Intl.DateTimeFormat('ja-JP', {
    timeZone: 'Asia/Tokyo',
    year: 'numeric', month: 'numeric', day: 'numeric', weekday: 'long'
  }).formatToParts(new Date());
  const get = t => (parts.find(p => p.type === t) || {}).value || '';
  return `${get('year')}年${get('month')}月${get('day')}日（${get('weekday')}）`;
}

async function loadTopic() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('./world_topic.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    document.getElementById('date-badge').textContent = formatDateJa(data.generated_at_jst) || todayJa();

    const sections = (data.sections || []).map(s => `
      <div class="section-card">
        <h3>${s.title}</h3>
        <p>${s.body}</p>
      </div>`).join('');

    const keywords = (data.related_keywords || []).map(k =>
      `<span class="keyword-tag">${k}</span>`).join('');

    const leaseInsight = data.lease_insight ? `
      <div class="lease-insight-card">
        <div class="lease-insight-label">✈ リース業界への示唆</div>
        <p>${data.lease_insight}</p>
      </div>` : '';

    const takeaway = data.key_takeaway ? `
      <div class="takeaway-card">
        <div class="takeaway-label">Key Takeaway</div>
        <p>${data.key_takeaway}</p>
      </div>` : '';

    app.innerHTML = `
      ${data.news_connection ? `<div class="news-connection">📰 ${data.news_connection}</div>` : ''}
      <div class="topic-label">Today's Aviation Deep Dive</div>
      <h2 class="topic-title">${data.topic || ''}</h2>
      ${data.headline ? `<div class="topic-headline">${data.headline}</div>` : ''}
      ${data.lead ? `<div class="lead-card">${data.lead}</div>` : ''}
      ${sections}
      ${leaseInsight}
      ${takeaway}
      ${keywords ? `<div class="keywords-section"><div class="keywords-label">関連キーワード</div><div class="keyword-tags">${keywords}</div></div>` : ''}
    `;
  } catch (err) {
    console.error(err);
    document.getElementById('date-badge').textContent = todayJa();
    app.innerHTML = `
      <div class="error-card">
        <p>トピックの読み込みに失敗しました。</p>
        <p style="font-size:0.8rem;margin-top:8px;opacity:0.7;">${err.message}</p>
      </div>`;
  }
}

loadTopic();
</script>
</body>
</html>
