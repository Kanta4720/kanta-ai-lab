<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>マリンキャッチ</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0b1026;color:white;font-family:'Hiragino Maru Gothic ProN','Yu Gothic UI',system-ui,sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh}.screen{position:fixed;inset:0;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at 50% 25%,rgba(255,122,184,.25),transparent 35%),linear-gradient(180deg,#101943,#3b175c);z-index:5}.panel{width:min(92vw,430px);padding:28px 24px;border:1px solid rgba(255,255,255,.28);border-radius:24px;background:rgba(10,12,35,.72);box-shadow:0 20px 80px rgba(0,0,0,.45);backdrop-filter:blur(10px)}h1{margin:0 0 8px;font-size:clamp(38px,10vw,60px);line-height:1;background:linear-gradient(135deg,#ffe36e,#ff7ab8,#8ec5ff);-webkit-background-clip:text;background-clip:text;color:transparent}p{margin:8px 0;color:#d9d3ff;line-height:1.7}.btn{width:100%;margin-top:14px;border:0;border-radius:999px;padding:14px 18px;font-size:18px;font-weight:900;color:white;background:linear-gradient(135deg,#ff5fa2,#ff2d78);box-shadow:0 10px 25px rgba(255,45,120,.35);cursor:pointer}.btn.secondary{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);box-shadow:none}.hud{position:fixed;inset:0;pointer-events:none;z-index:2}.score{position:absolute;left:14px;top:12px;font-weight:900;font-size:28px;text-shadow:0 3px 12px #000}.time{position:absolute;right:14px;top:16px;width:min(210px,40vw)}.bar{height:16px;border:1px solid rgba(255,255,255,.4);border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}.fill{height:100%;width:100%;background:linear-gradient(90deg,#4ade80,#facc15,#fb7185);transition:width .1s linear}.hint{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-size:13px;color:#fff;background:rgba(0,0,0,.28);padding:6px 14px;border-radius:999px;white-space:nowrap}.hidden{display:none}.rank{font-size:58px;font-weight:1000;margin:8px auto 10px;width:112px;height:112px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 35% 25%,#fff176,#ff9800 62%,#e65100);box-shadow:0 0 42px rgba(255,180,0,.8)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud hidden" id="hud"><div class="score">💰 <span id="score">0</span></div><div class="time"><div class="bar"><div class="fill" id="fill"></div></div></div><div class="hint">ドラッグ / ← → でマリンを動かしてね</div></div>
<div class="screen" id="title"><div class="panel"><h1>🐕 マリンキャッチ</h1><p>マリンを動かして、ほねとハートをキャッチ。怒ったえりかは避けよう。</p><p>🦴 +10 / ⭐ +100 / 💕 シールド / 💢 ダメージ</p><button class="btn" id="start">スタート</button></div></div>
<div class="screen hidden" id="result"><div class="panel"><div class="rank" id="rank">A</div><h2 id="resultTitle">結果</h2><p>スコア: <b id="finalScore">0</b></p><p>ハイスコア: <b id="highScore">0</b></p><button class="btn" id="retry">もういちど</button><button class="btn secondary" id="back">タイトルへ</button></div></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1,keys={},pointer=null,playing=false,last=0,spawn=0,time=60,score=0,high=+localStorage.marinCatchHigh||0,items=[],parts=[],shield=0;
const dog={x:0,y:0,w:84,target:0};
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);dog.y=H-92;if(!playing){dog.x=W/2;dog.target=dog.x}}addEventListener('resize',resize);resize();
const $=id=>document.getElementById(id),rand=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
addEventListener('keydown',e=>keys[e.key]=true);addEventListener('keyup',e=>keys[e.key]=false);
canvas.addEventListener('pointerdown',e=>{pointer=e.pointerId;dog.target=e.clientX});canvas.addEventListener('pointermove',e=>{if(pointer===e.pointerId)dog.target=e.clientX});canvas.addEventListener('pointerup',()=>pointer=null);
function start(){playing=true;time=60;score=0;spawn=0;items=[];parts=[];shield=0;dog.x=W/2;dog.target=dog.x;$('title').classList.add('hidden');$('result').classList.add('hidden');$('hud').classList.remove('hidden');last=performance.now();requestAnimationFrame(loop)}
$('start').onclick=start;$('retry').onclick=start;$('back').onclick=()=>{$('result').classList.add('hidden');$('title').classList.remove('hidden')};
function addItem(){const r=Math.random();let type=r<.55?'bone':r<.70?'gold':r<.84?'heart':'bad';items.push({type,x:rand(32,W-32),y:-30,vy:rand(150,260)+score*.025,rot:rand(-1,1),vr:rand(-3,3),r:type==='bad'?24:20})}
function pop(x,y,text,color){parts.push({x,y,text,color,t:0,life:.8})}
function hit(it){const dx=it.x-dog.x,dy=it.y-(dog.y-10);return Math.hypot(dx,dy)<it.r+38}
function catchItem(it){if(it.type==='bad'){if(shield>0){score+=30;shield=0;pop(it.x,it.y,'BLOCK +30','#80deea')}else{score=Math.max(0,score-50);pop(it.x,it.y,'-50','#ff6b6b')}}else if(it.type==='gold'){score+=100;pop(it.x,it.y,'+100','#ffd54a')}else if(it.type==='heart'){score+=30;shield=8;pop(it.x,it.y,'SHIELD','#ff8ac8')}else{score+=10;pop(it.x,it.y,'+10','#fff')}}
function loop(now){if(!playing)return;const dt=Math.min((now-last)/1000,.05);last=now;time-=dt;spawn-=dt;if(spawn<=0){addItem();spawn=Math.max(.22,.72-score/5000)}if(keys.ArrowLeft||keys.a)dog.target-=520*dt;if(keys.ArrowRight||keys.d)dog.target+=520*dt;dog.target=clamp(dog.target,42,W-42);dog.x+=(dog.target-dog.x)*Math.min(1,dt*12);shield=Math.max(0,shield-dt);
for(const it of items){it.y+=it.vy*dt;it.rot+=it.vr*dt}for(const it of items){if(hit(it)){catchItem(it);it.dead=true}else if(it.y>H+60){it.dead=true}}items=items.filter(i=>!i.dead);for(const p of parts)p.t+=dt;parts=parts.filter(p=>p.t<p.life);draw(now/1000);$('score').textContent=score;$('fill').style.width=Math.max(0,time/60*100)+'%';if(time<=0)end();else requestAnimationFrame(loop)}
function end(){playing=false;$('hud').classList.add('hidden');if(score>high){high=score;localStorage.marinCatchHigh=high;$('resultTitle').textContent='NEW RECORD!'}else $('resultTitle').textContent='結果';$('finalScore').textContent=score;$('highScore').textContent=high;let rank=score>=1500?'S':score>=1000?'A':score>=600?'B':score>=250?'C':'D';$('rank').textContent=rank;$('result').classList.remove('hidden')}
function bg(t){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#07122f');g.addColorStop(.55,'#17164c');g.addColorStop(1,'#471860');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.85)';for(let i=0;i<90;i++){let x=(i*97+t*12)%W,y=(i*53)%Math.max(1,H*.72),a=.35+.65*Math.abs(Math.sin(t+i));ctx.globalAlpha=a;ctx.beginPath();ctx.arc(x,y,1+(i%3),0,7);ctx.fill()}ctx.globalAlpha=1;ctx.strokeStyle='rgba(255,190,235,.8)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,H-50);ctx.lineTo(W,H-50);ctx.stroke()}
function dogDraw(t){ctx.save();ctx.translate(dog.x,dog.y+Math.sin(t*8)*2);if(shield>0){ctx.strokeStyle='rgba(128,222,234,.8)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,-8,58,0,7);ctx.stroke()}ctx.fillStyle='#fff4d6';ctx.strokeStyle='#bc8d56';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,20,26,17,0,0,7);ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(0,-9,30,25,0,0,7);ctx.fill();ctx.stroke();for(const s of[-1,1]){ctx.fillStyle='#f1d3a2';ctx.beginPath();ctx.moveTo(s*9,-25);ctx.quadraticCurveTo(s*42,-48,s*30,-10);ctx.closePath();ctx.fill();ctx.stroke()}ctx.fillStyle='#222';for(const s of[-1,1]){ctx.beginPath();ctx.arc(s*11,-12,5.5,0,7);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s*9,-14,1.8,0,7);ctx.fill();ctx.fillStyle='#222'}ctx.fillStyle='#8b5a3d';ctx.beginPath();ctx.ellipse(0,-3,4,3,0,0,7);ctx.fill();ctx.strokeStyle='#8b5a3d';ctx.beginPath();ctx.arc(-3,3,4,0,Math.PI);ctx.arc(3,3,4,0,Math.PI);ctx.stroke();ctx.fillStyle='rgba(255,128,170,.45)';ctx.beginPath();ctx.ellipse(-20,-2,5,3,0,0,7);ctx.fill();ctx.beginPath();ctx.ellipse(20,-2,5,3,0,0,7);ctx.fill();ctx.restore()}
function itemDraw(it,t){ctx.save();ctx.translate(it.x,it.y);ctx.rotate(it.rot);ctx.font='34px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor=it.type==='gold'?'#ffd54a':'transparent';ctx.shadowBlur=it.type==='gold'?20:0;ctx.fillText(it.type==='bone'?'🦴':it.type==='gold'?'⭐':it.type==='heart'?'💕':'💢',0,0);ctx.restore()}
function draw(t){bg(t);for(const it of items)itemDraw(it,t);dogDraw(t);for(const p of parts){let a=1-p.t/p.life;ctx.globalAlpha=a;ctx.font='900 24px system-ui';ctx.textAlign='center';ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=4;ctx.fillStyle=p.color;ctx.strokeText(p.text,p.x,p.y-p.t*70);ctx.fillText(p.text,p.x,p.y-p.t*70)}ctx.globalAlpha=1}
draw(0);
</script>
</body>
</html>
