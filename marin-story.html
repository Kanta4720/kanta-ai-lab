<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マリンのおとどけもの</title>
<style>
  html, body { margin: 0; min-height: 100%; background: #1a1035; color: #fff; font-family: system-ui, sans-serif; }
  .loading { min-height: 100vh; display: grid; place-items: center; text-align: center; }
  .spinner { width: 38px; height: 38px; border: 4px solid rgba(255,255,255,.2); border-top-color: #ffb7d5; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loading"><div><div class="spinner"></div><strong>マリンのおとどけものを読み込み中...</strong></div></div>
<script>
(async () => {
  const parts = [
    'marin-story-assets/part01.txt',
    'marin-story-assets/part02.txt',
    'marin-story-assets/part03.txt',
    'marin-story-assets/part04.txt',
    'marin-story-assets/part05.txt',
    'marin-story-assets/part06.txt',
    'marin-story-assets/part07.txt',
    'marin-story-assets/part08.txt',
    'marin-story-assets/part09.txt',
    'marin-story-assets/part10.txt'
  ];
  const chunks = await Promise.all(parts.map(async (path) => {
    const response = await fetch(path, { cache: 'no-store' });
    if (!response.ok) throw new Error(path + ': ' + response.status);
    return response.text();
  }));
  const binary = atob(chunks.join(''));
  const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
  const html = new TextDecoder('utf-8').decode(bytes);
  document.open();
  document.write(html);
  document.close();
})().catch((error) => {
  document.body.innerHTML = '<div class="loading"><div><strong>読み込みに失敗しました</strong><br>' + String(error) + '</div></div>';
});
</script>
</body>
</html>
